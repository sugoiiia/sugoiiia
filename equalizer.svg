<div align="center">

<svg width="100%" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <rect x="0"   y="0" width="20" height="60" fill="#C8B87A" fill-opacity="1" rx="4">
    <animate attributeName="height" values="60;20;50;10;60" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="0;20;5;30;0" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="1;0.6;0.9;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="40"  y="0" width="20" height="60" fill="#C8B87A" fill-opacity="0.9" rx="4">
    <animate attributeName="height" values="20;60;30;60;20" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;0;15;0;20" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.9;0.5;1;0.6;0.9" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="80"  y="0" width="20" height="60" fill="#C8B87A" fill-opacity="0.8" rx="4">
    <animate attributeName="height" values="40;15;60;25;40" dur="1.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="10;30;0;20;10" dur="1.3s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.8;0.5;1;0.6;0.8" dur="1.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="120" y="0" width="20" height="60" fill="#C8B87A" fill-opacity="0.85" rx="4">
    <animate attributeName="height" values="15;50;20;60;15" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="30;10;25;0;30" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.85;0.6;0.9;1;0.85" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="160" y="0" width="20" height="60" fill="#C8B87A" fill-opacity="0.95" rx="4">
    <animate attributeName="height" values="55;30;10;45;55" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="5;20;40;10;5" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.95;0.7;0.5;0.85;0.95" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>

</div>
