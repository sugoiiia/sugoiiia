<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="100%" height="60" preserveAspectRatio="none">

  <!-- 10 thinner bars -->
  
  <rect x="0" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="60;20;50;10;60" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="0;20;5;30;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <rect x="24" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="20;60;30;60;20" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;0;15;0;20" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <rect x="48" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="40;15;60;25;40" dur="1.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="10;30;0;20;10" dur="1.3s" repeatCount="indefinite"/>
  </rect>

  <rect x="72" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="15;50;20;60;15" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="30;10;25;0;30" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <rect x="96" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="55;30;10;45;55" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="5;20;40;10;5" dur="1s" repeatCount="indefinite"/>
  </rect>

  <rect x="120" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="30;55;15;60;30" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="15;5;35;0;15" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="144" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="50;25;60;20;50" dur="0.95s" repeatCount="indefinite"/>
    <animate attributeName="y" values="5;20;0;25;5" dur="0.95s" repeatCount="indefinite"/>
  </rect>

  <rect x="168" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="10;40;20;55;10" dur="0.85s" repeatCount="indefinite"/>
    <animate attributeName="y" values="40;10;25;5;40" dur="0.85s" repeatCount="indefinite"/>
  </rect>

  <rect x="192" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="60;35;15;45;60" dur="1.05s" repeatCount="indefinite"/>
    <animate attributeName="y" values="0;15;35;10;0" dur="1.05s" repeatCount="indefinite"/>
  </rect>

  <rect x="216" y="0" width="10" height="60" fill="#C8B87A" rx="3">
    <animate attributeName="height" values="25;60;35;10;25" dur="1.15s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;0;15;40;20" dur="1.15s" repeatCount="indefinite"/>
  </rect>

</svg>
